services:
  db:
    env_file:
      - deploy/env/docker.dev.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - robodj_pgdata:/var/lib/postgresql/data

  redis:
    env_file:
      - deploy/env/docker.dev.env
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    env_file:
      - deploy/env/docker.dev.env
    build:
      context: .
      dockerfile: infra/docker/dev.Dockerfile
    image: dgn-dj/backend:dev
    working_dir: /workspace
    command: >
      uvicorn backend.app:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir backend
    volumes:
      - ./backend:/workspace/backend
      - ./config:/workspace/config
      - ./alembic.ini:/workspace/alembic.ini
      - ./scripts:/workspace/scripts

  frontend:
    env_file:
      - deploy/env/docker.dev.env
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
    volumes:
      - ./:/workspace
      - /workspace/node_modules

volumes:
  robodj_pgdata:
